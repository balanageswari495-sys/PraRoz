<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PraRoz Website</title>

    <!-- CSS -->
    <link rel="stylesheet" href="index.css">

    <!-- Font Awesome (icons) -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <div class="logo">PraRoz</div>

    <nav>
        <a href="#">HOME</a>
        <a href="#">ABOUT</a>
        <a href="#">SERVICE</a>
        <a href="#">DESIGN</a>
        <a href="#">CONTACT</a>
    </nav>

    <div class="search-box">
        <input type="text" placeholder="Type to Search">
        <button>Search</button>
    </div>
</header>

<section class="main">

    <!-- LEFT CONTENT -->
    <div class="content">
        <h1>
            Web Design & <br>
            <span>Development</span><br>
            Course
        </h1>

        <p>
            Web Design is a specialisation of the design stream. They also use HTML,
            CSS, WYSIWYG editing software, mark up validators etc..
            to create design elements.
        </p>

        <button class="join-btn">JOIN US</button>
    </div>

    <!-- LOGIN BOX -->
    <div class="login-box">
        <h2>Login Here</h2>

        <input type="email" placeholder="Enter Email Here">
        <input type="password" placeholder="Enter Password Here">

        <button class="login-btn">Login</button>

        <p class="link">
            Don't have an account?<br>
            <a href="#">Sign up here</a>
        </p>

        <p class="liw">Log in with</p>

        <div class="icons">
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-twitter"></i>
            <i class="fa-brands fa-google"></i>
            <i class="fa-brands fa-skype"></i>
        </div>
    </div>

</section>

<script src="index.js"></script>

</body>
</html>
